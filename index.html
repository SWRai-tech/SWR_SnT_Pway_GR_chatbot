<!DOCTYPE html>
<html>
<head>
<title>GRnSR / IRSEM / IRPWM Chatbot</title>

<style>
body {
    font-family: Arial;
    background: #f2f2f2;
}

#chatbox {
    width: 500px;
    margin: 40px auto;
    background: white;
    padding: 20px;
    border-radius: 10px;
    box-shadow: 0 0 10px #ccc;
}

#messages {
    height: 300px;
    overflow-y: auto;
    border: 1px solid #ddd;
    padding: 10px;
    margin-bottom: 10px;
}

input {
    width: 80%;
    padding: 10px;
}

button {
    padding: 10px;
}
</style>

</head>

<body>

<div id="chatbox">
<h2>Ask GRnSR / IRSEM / IRPWM</h2>

<div id="messages"></div>

<input type="text" id="question" placeholder="Type your question">
<button onclick="sendQuestion()">Send</button>
</div>

<script>

if (!localStorage.getItem("sessionId")) {
    localStorage.setItem("sessionId", "user-" + Math.random().toString(36).substring(2));
}

async function sendQuestion() {

    let q = document.getElementById("question").value.trim();
    if (!q) return;

    let messages = document.getElementById("messages");

    // Show user message
    messages.innerHTML += `<p class="user"><b>You:</b> ${q}</p>`;

    // Auto scroll after user message
    messages.scrollTo({
      top: messages.scrollHeight,
      behavior: "smooth"
    });

    // Loading indicator
    messages.innerHTML += `<p id="loading">AI is typing...</p>`;

    // Auto scroll after loading indicator
    messages.scrollTo({
      top: messages.scrollHeight,
      behavior: "smooth"
    });

    try {
        const response = await fetch(
            "https://n8n.a2zenith.app/webhook/RAG_User_Query",
            {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    query: q,
                    sessionId: localStorage.getItem("sessionId")
                })
            }
        );

        const data = await response.json();

        // Remove loading indicator if still present
        const loading = document.getElementById("loading");
        if (loading) loading.remove();

        // Show AI response
        messages.innerHTML += `
<p class="ai">
<b>AI:</b><br>${data.answer ?? "No answer returned."}
</p>
`;

        messages.scrollTo({
          top: messages.scrollHeight,
          behavior: "smooth"
        });
    } catch (error) {
        const loading = document.getElementById("loading");
        if (loading) loading.remove();

        messages.innerHTML += `<p style="color:red;">Error connecting to server</p>`;

        messages.scrollTo({
          top: messages.scrollHeight,
          behavior: "smooth"
        });
    }

    // Clear input
    document.getElementById("question").value = "";
}
    

</script>

</body>
</html>
