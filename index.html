<!DOCTYPE html><html>
<head>
<title>GRnSR / IRSEM / IRPWM Chatbot</title>
<style>
body{
font-family: Arial;
background:#f2f2f2;
}#chatbox{
width:500px;
margin:40px auto;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px #ccc;
}

#messages{
height:350px;
overflow-y:auto;
border:1px solid #ddd;
padding:10px;
margin-bottom:10px;
}

input{
width:75%;
padding:10px;
}

button{
padding:10px 15px;
}

.user{
color:blue;
}

.ai{
color:green;
white-space: pre-line;
}
</style>

</head><body><div id="chatbox">
<h2 style="text-align:center;">Ask GRnSR / IRSEM / IRPWM</h2><div id="messages"></div><input id="question" placeholder="Ask railway manuals..."/>
<button onclick="sendQuestion()">Send</button>
</div><script>

// Create session ID
if(!localStorage.getItem("sessionId")){
  localStorage.setItem("sessionId", "user-" + Math.random().toString(36).substring(2));
}

// Enter key support
document.getElementById("question").addEventListener("keypress", function(e) {
  if (e.key === "Enter") sendQuestion();
});

async function sendQuestion(){

let q = document.getElementById("question").value;
if(!q) return;

let messages = document.getElementById("messages");

messages.innerHTML += <p class='user'><b>You:</b> ${q}</p>;

if(!document.getElementById("loading")){
  messages.innerHTML += <p id="loading">AI is typing...</p>;
}

try {

const response = await fetch(
"https://n8n.a2zenith.app/webhook/Rag_User-Query",
{
method:"POST",
headers:{"Content-Type":"application/json"},
body: JSON.stringify({
  query: q,
  sessionId: localStorage.getItem("sessionId")
})
});

const data = await response.json();

document.getElementById("loading")?.remove();

messages.innerHTML += `
<p class='ai'>
<b>AI:</b><br>${data.answer}
</p>
`;

messages.scrollTop = messages.scrollHeight;

} catch (error) {

document.getElementById("loading")?.remove();
messages.innerHTML += <p style="color:red;">⚠️ Server not reachable</p>;

}

document.getElementById("question").value="";
}

</script></body>
</html>
